config:
  frontend_ip_type: static
  frontend_ip_name: "my-reserved-ip"
  enable_https: true
  ssl_certificate: "projects/my-proj/global/sslCertificates/my-cert" 
  enable_http_redirect: true
  network: "projects/my-proj/global/networks/my-vpc"
  subnetwork: "projects/my-proj/regions/us-central1/subnetworks/my-proxy-subnet"

backends:
  web-frontend:
    backend_type: MIG
    enable_cdn: true
    enable_logging: true
    health_check:
      path: /healthz
      port: 80

  api-service:
    backend_type: NEG
    enable_cdn: false
    enable_logging: true
    health_check:
      path: /api/status
      port: 8080
      
  assets-bucket:
    backend_type: BUCKET
    enable_cdn: true
    enable_logging: false

routing:
  host_rules:
    - host: www.example.com
      backend: web-frontend
    - host: api.example.com
      backend: api-service
  path_rules:
    - path: /static/*
      backend: assets-bucket
    - path: /images/*
      backend: assets-bucket
